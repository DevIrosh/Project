    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 24px 40px;
            position: relative;
            overflow: hidden;
        }

        .error-bg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .error-orb-1 {
            position: absolute;
            top: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .error-orb-2 {
            position: absolute;
            bottom: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(123, 47, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .error-content {
            position: relative;
            z-index: 1;
            max-width: 600px;
        }

        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(100px, 20vw, 180px);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.04em;
        }

        .error-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .error-description {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 40px;
            max-width: 460px;
            margin-left: auto;
            margin-right: auto;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .error-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 0;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .error-navbar .inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 clamp(24px, 4vw, 80px);
        }

        .error-nav-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .error-nav-logo {
            height: 38px;
            width: auto;
        }

        .error-nav-brand .brand-zyora { color: var(--cyan); }
        .error-nav-brand .brand-tech  { color: var(--text-primary); }

        .error-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            border-radius: 2px;
            margin: 0 auto 32px;
        }

<body>

    <!-- Minimal navbar -->
    <nav class="error-navbar">
        <div class="inner">
            <a href="/" class="error-nav-brand">

        </div>
    </nav>

    <!-- 404 content -->
    <main class="error-page">
        <div class="error-bg">
            <div class="error-orb-1"></div>
            <div class="error-orb-2"></div>
        </div>

        <div class="error-content">
            <div class="error-code">404</div>

            <h1 class="error-title">Page Not Found</h1>
            <p class="error-description">
                The page you're looking for doesn't exist or has been moved.
                It might be an old link, a typo in the URL, or the page may have been removed.
            </p>
            <div class="error-actions">
                <a href="/" class="btn btn-primary">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <a href="/#contact" class="btn btn-outline">
                    <i class="fas fa-envelope"></i> Contact Us
                </a>
            </div>
        </div>
    </main>

</body>
