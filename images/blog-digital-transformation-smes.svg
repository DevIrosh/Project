<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1323"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4ea0ff;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#4ea0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle arc lines suggesting a horizon / growth curve -->
  <path d="M 0 380 Q 450 200 900 320" fill="none" stroke="rgba(108,99,255,0.06)" stroke-width="80"/>
  <path d="M 0 400 Q 450 240 900 350" fill="none" stroke="rgba(0,212,255,0.04)" stroke-width="60"/>

  <!-- ===== LEFT SIDE: Business before (fragmented) ===== -->
  <g transform="translate(50, 60)">
    <text x="90" y="0" font-size="10" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif" letter-spacing="1.5">BEFORE</text>

    <!-- WhatsApp icon box -->
    <rect x="20" y="20" width="60" height="52" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="28" y="30" width="44" height="32" rx="5" fill="rgba(37,211,102,0.12)" stroke="rgba(37,211,102,0.25)" stroke-width="1"/>
    <text x="50" y="51" font-size="16" text-anchor="middle" fill="#25d366">◉</text>
    <text x="50" y="80" font-size="7.5" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif">WhatsApp</text>

    <!-- Spreadsheet box -->
    <rect x="110" y="20" width="60" height="52" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="118" y="30" width="44" height="32" rx="3" fill="rgba(255,189,46,0.1)" stroke="rgba(255,189,46,0.2)" stroke-width="1"/>
    <!-- spreadsheet grid -->
    <line x1="132" y1="30" x2="132" y2="62" stroke="rgba(255,189,46,0.3)" stroke-width="0.7"/>
    <line x1="147" y1="30" x2="147" y2="62" stroke="rgba(255,189,46,0.3)" stroke-width="0.7"/>
    <line x1="118" y1="43" x2="162" y2="43" stroke="rgba(255,189,46,0.3)" stroke-width="0.7"/>
    <line x1="118" y1="53" x2="162" y2="53" stroke="rgba(255,189,46,0.3)" stroke-width="0.7"/>
    <text x="140" y="80" font-size="7.5" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif">Spreadsheet</text>

    <!-- Manual invoice box -->
    <rect x="65" y="100" width="60" height="52" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="73" y="110" width="44" height="32" rx="3" fill="rgba(255,95,87,0.08)" stroke="rgba(255,95,87,0.2)" stroke-width="1"/>
    <text x="95" y="131" font-size="10" text-anchor="middle" fill="#ff5f57" font-family="'Inter', sans-serif">📄</text>
    <text x="95" y="160" font-size="7.5" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif">Manual Invoice</text>

    <!-- Disconnected lines (jagged/dashed) -->
    <line x1="50" y1="72" x2="95" y2="100" stroke="rgba(255,95,87,0.3)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <line x1="140" y1="72" x2="95" y2="100" stroke="rgba(255,95,87,0.3)" stroke-width="1.5" stroke-dasharray="4 3"/>

    <!-- Warning badge -->
    <rect x="50" y="178" width="110" height="22" rx="11" fill="rgba(255,95,87,0.1)" stroke="rgba(255,95,87,0.2)" stroke-width="1"/>
    <text x="105" y="193" font-size="8" fill="#ff5f57" text-anchor="middle" font-family="'Inter', sans-serif">⚠ Fragile &amp; Disconnected</text>
  </g>

  <!-- ===== CENTRE: Transformation roadmap ===== -->
  <g transform="translate(250, 40)">
    <text x="200" y="0" font-size="10" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif" letter-spacing="1.5">TRANSFORMATION ROADMAP</text>

    <!-- Vertical spine line -->
    <line x1="200" y1="20" x2="200" y2="340" stroke="url(#roadGrad)" stroke-width="2.5" stroke-dasharray="6 4"/>

    <!-- Step nodes and cards -->
    <!-- Step 1 -->
    <circle cx="200" cy="42" r="14" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="2" filter="url(#softGlow)"/>
    <text x="200" y="47" font-size="10" fill="#00d4ff" text-anchor="middle" font-weight="bold" font-family="'Inter', sans-serif">1</text>
    <rect x="220" y="28" width="180" height="36" rx="8" fill="rgba(0,212,255,0.07)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <text x="230" y="44" font-size="9" fill="#c8d0e0" font-family="'Inter', sans-serif" font-weight="600">Move data to the cloud</text>
    <text x="230" y="57" font-size="7.5" fill="#6b7a99" font-family="'Inter', sans-serif">Google Workspace · shared access</text>

    <!-- Step 2 -->
    <circle cx="200" cy="100" r="14" fill="rgba(108,99,255,0.15)" stroke="#6c63ff" stroke-width="2" filter="url(#softGlow)"/>
    <text x="200" y="105" font-size="10" fill="#6c63ff" text-anchor="middle" font-weight="bold" font-family="'Inter', sans-serif">2</text>
    <rect x="220" y="86" width="180" height="36" rx="8" fill="rgba(108,99,255,0.07)" stroke="rgba(108,99,255,0.2)" stroke-width="1"/>
    <text x="230" y="102" font-size="9" fill="#c8d0e0" font-family="'Inter', sans-serif" font-weight="600">Automate one process first</text>
    <text x="230" y="115" font-size="7.5" fill="#6b7a99" font-family="'Inter', sans-serif">invoicing · reminders · reporting</text>

    <!-- Step 3 -->
    <circle cx="200" cy="158" r="14" fill="rgba(78,160,255,0.15)" stroke="#4ea0ff" stroke-width="2" filter="url(#softGlow)"/>
    <text x="200" y="163" font-size="10" fill="#4ea0ff" text-anchor="middle" font-weight="bold" font-family="'Inter', sans-serif">3</text>
    <rect x="220" y="144" width="180" height="36" rx="8" fill="rgba(78,160,255,0.07)" stroke="rgba(78,160,255,0.2)" stroke-width="1"/>
    <text x="230" y="160" font-size="9" fill="#c8d0e0" font-family="'Inter', sans-serif" font-weight="600">Connect existing systems</text>
    <text x="230" y="173" font-size="7.5" fill="#6b7a99" font-family="'Inter', sans-serif">integrations · no duplicate entry</text>

    <!-- Step 4 -->
    <circle cx="200" cy="216" r="14" fill="rgba(255,215,128,0.15)" stroke="#ffd580" stroke-width="2" filter="url(#softGlow)"/>
    <text x="200" y="221" font-size="10" fill="#ffd580" text-anchor="middle" font-weight="bold" font-family="'Inter', sans-serif">4</text>
    <rect x="220" y="202" width="180" height="36" rx="8" fill="rgba(255,215,128,0.05)" stroke="rgba(255,215,128,0.2)" stroke-width="1"/>
    <text x="230" y="218" font-size="9" fill="#c8d0e0" font-family="'Inter', sans-serif" font-weight="600">Digital customer channel</text>
    <text x="230" y="231" font-size="7.5" fill="#6b7a99" font-family="'Inter', sans-serif">portal · online orders · tracking</text>

    <!-- Step 5 -->
    <circle cx="200" cy="274" r="14" fill="rgba(40,200,64,0.15)" stroke="#28c840" stroke-width="2" filter="url(#softGlow)"/>
    <text x="200" y="279" font-size="10" fill="#28c840" text-anchor="middle" font-weight="bold" font-family="'Inter', sans-serif">5</text>
    <rect x="220" y="260" width="180" height="36" rx="8" fill="rgba(40,200,64,0.05)" stroke="rgba(40,200,64,0.2)" stroke-width="1"/>
    <text x="230" y="276" font-size="9" fill="#c8d0e0" font-family="'Inter', sans-serif" font-weight="600">Real-time management data</text>
    <text x="230" y="289" font-size="7.5" fill="#6b7a99" font-family="'Inter', sans-serif">dashboard · KPIs · live metrics</text>

    <!-- Step 6 -->
    <circle cx="200" cy="332" r="16" fill="rgba(108,99,255,0.25)" stroke="#6c63ff" stroke-width="2.5" filter="url(#glow)"/>
    <text x="200" y="337" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold" font-family="'Inter', sans-serif">6</text>
    <rect x="220" y="318" width="180" height="36" rx="8" fill="rgba(108,99,255,0.12)" stroke="rgba(108,99,255,0.35)" stroke-width="1.5"/>
    <text x="230" y="334" font-size="9" fill="#c8d0e0" font-family="'Inter', sans-serif" font-weight="600">Now consider AI</text>
    <text x="230" y="347" font-size="7.5" fill="#6b7a99" font-family="'Inter', sans-serif">clean data first → AI on solid ground</text>
  </g>

  <!-- ===== RIGHT SIDE: Result dashboard ===== -->
  <g transform="translate(666, 55)">
    <text x="107" y="0" font-size="10" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif" letter-spacing="1.5">AFTER</text>

    <!-- Dashboard card -->
    <rect x="0" y="15" width="214" height="310" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Dashboard header bar -->
    <rect x="0" y="15" width="214" height="34" rx="14" fill="rgba(108,99,255,0.15)"/>
    <rect x="0" y="35" width="214" height="14" fill="rgba(108,99,255,0.15)"/>
    <text x="107" y="37" font-size="9.5" fill="#fff" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600">Business Dashboard</text>

    <!-- Metric tiles row -->
    <rect x="10" y="60" width="90" height="50" rx="8" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <text x="55" y="81" font-size="14" fill="#00d4ff" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="700">LKR 2.4M</text>
    <text x="55" y="96" font-size="7.5" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif">Revenue MTD</text>
    <text x="55" y="106" font-size="7" fill="#28c840" text-anchor="middle" font-family="'Inter', sans-serif">▲ 18% vs last month</text>

    <rect x="114" y="60" width="90" height="50" rx="8" fill="rgba(108,99,255,0.08)" stroke="rgba(108,99,255,0.2)" stroke-width="1"/>
    <text x="159" y="81" font-size="14" fill="#6c63ff" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="700">94%</text>
    <text x="159" y="96" font-size="7.5" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif">Orders On Time</text>
    <text x="159" y="106" font-size="7" fill="#28c840" text-anchor="middle" font-family="'Inter', sans-serif">▲ up from 71%</text>

    <!-- Bar chart area -->
    <rect x="10" y="120" width="194" height="80" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="20" y="135" font-size="7.5" fill="#6b7a99" font-family="'Inter', sans-serif">Weekly Sales</text>
    <!-- bars -->
    <rect x="22" y="175" width="16" height="15" rx="2" fill="#6c63ff" opacity="0.6"/>
    <rect x="43" y="168" width="16" height="22" rx="2" fill="#6c63ff" opacity="0.7"/>
    <rect x="64" y="156" width="16" height="34" rx="2" fill="#6c63ff" opacity="0.8"/>
    <rect x="85" y="161" width="16" height="29" rx="2" fill="#6c63ff" opacity="0.75"/>
    <rect x="106" y="152" width="16" height="38" rx="2" fill="#00d4ff"/>
    <rect x="127" y="148" width="16" height="42" rx="2" fill="#00d4ff"/>
    <rect x="148" y="143" width="16" height="47" rx="2" fill="#6c63ff" filter="url(#softGlow)"/>
    <rect x="169" y="147" width="16" height="43" rx="2" fill="#6c63ff" opacity="0.9"/>
    <!-- trend line -->
    <polyline points="30,180 51,173 72,162 93,166 114,157 135,152 156,147 177,151" fill="none" stroke="#ffd580" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.7"/>

    <!-- Stock & outstanding row -->
    <rect x="10" y="210" width="90" height="44" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="55" y="225" font-size="7.5" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif">Stock Alerts</text>
    <text x="55" y="242" font-size="12" fill="#ffd580" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="600">3 low</text>
    <text x="55" y="250" font-size="6.5" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif">auto-reorder active</text>

    <rect x="114" y="210" width="90" height="44" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="159" y="225" font-size="7.5" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif">Receivables</text>
    <text x="159" y="242" font-size="12" fill="#28c840" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="600">LKR 340K</text>
    <text x="159" y="250" font-size="6.5" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif">reminders automated</text>

    <!-- Live indicator -->
    <rect x="10" y="264" width="194" height="20" rx="6" fill="rgba(40,200,64,0.06)" stroke="rgba(40,200,64,0.15)" stroke-width="1"/>
    <circle cx="23" cy="274" r="4" fill="#28c840" filter="url(#softGlow)"/>
    <text x="33" y="278" font-size="7.5" fill="#28c840" font-family="'Inter', sans-serif">Live · updated 2 seconds ago</text>

    <!-- Check mark badge -->
    <rect x="30" y="294" width="154" height="22" rx="11" fill="rgba(40,200,64,0.1)" stroke="rgba(40,200,64,0.25)" stroke-width="1"/>
    <text x="107" y="309" font-size="8" fill="#28c840" text-anchor="middle" font-family="'Inter', sans-serif">✓ Fully Connected &amp; Automated</text>
  </g>

  <!-- Top badge -->
  <rect x="650" y="15" width="228" height="34" rx="17" fill="rgba(108,99,255,0.12)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
  <text x="665" y="37" font-size="12" fill="#8b85ff" font-weight="bold" font-family="'Inter', sans-serif">✦ Digital Transformation · SMEs</text>

  <!-- Bottom fade -->
  <rect x="0" y="385" width="900" height="35" fill="url(#bgGrad)" opacity="0.9"/>
  <!-- Watermark -->
  <text x="888" y="413" font-family="sans-serif" font-size="11" fill="#ffffff" opacity="0.18" text-anchor="end">© ZyoraTech</text>
</svg>
