<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0e1325"/>
    </linearGradient>
    <linearGradient id="purpleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#4ea0ff"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35"/>
      <stop offset="100%" style="stop-color:#0d1125"/>
    </linearGradient>
    <linearGradient id="flutterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0084c8;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="phoneScreen1">
      <rect x="146" y="94" width="108" height="192" rx="4"/>
    </clipPath>
    <clipPath id="phoneScreen2">
      <rect x="396" y="94" width="108" height="192" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle dots pattern -->
  <g opacity="0.06" fill="#ffffff">
    <circle cx="60" cy="60" r="1.5"/><circle cx="120" cy="60" r="1.5"/><circle cx="180" cy="60" r="1.5"/><circle cx="240" cy="60" r="1.5"/><circle cx="300" cy="60" r="1.5"/><circle cx="360" cy="60" r="1.5"/><circle cx="420" cy="60" r="1.5"/><circle cx="480" cy="60" r="1.5"/><circle cx="540" cy="60" r="1.5"/><circle cx="600" cy="60" r="1.5"/><circle cx="660" cy="60" r="1.5"/><circle cx="720" cy="60" r="1.5"/><circle cx="780" cy="60" r="1.5"/><circle cx="840" cy="60" r="1.5"/>
    <circle cx="60" cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/><circle cx="180" cy="120" r="1.5"/><circle cx="240" cy="120" r="1.5"/><circle cx="300" cy="120" r="1.5"/><circle cx="360" cy="120" r="1.5"/><circle cx="420" cy="120" r="1.5"/><circle cx="480" cy="120" r="1.5"/><circle cx="540" cy="120" r="1.5"/><circle cx="600" cy="120" r="1.5"/><circle cx="660" cy="120" r="1.5"/><circle cx="720" cy="120" r="1.5"/><circle cx="780" cy="120" r="1.5"/><circle cx="840" cy="120" r="1.5"/>
    <circle cx="60" cy="180" r="1.5"/><circle cx="120" cy="180" r="1.5"/><circle cx="180" cy="180" r="1.5"/><circle cx="240" cy="180" r="1.5"/><circle cx="300" cy="180" r="1.5"/><circle cx="360" cy="180" r="1.5"/><circle cx="420" cy="180" r="1.5"/><circle cx="480" cy="180" r="1.5"/><circle cx="540" cy="180" r="1.5"/><circle cx="600" cy="180" r="1.5"/><circle cx="660" cy="180" r="1.5"/><circle cx="720" cy="180" r="1.5"/><circle cx="780" cy="180" r="1.5"/><circle cx="840" cy="180" r="1.5"/>
    <circle cx="60" cy="240" r="1.5"/><circle cx="120" cy="240" r="1.5"/><circle cx="180" cy="240" r="1.5"/><circle cx="240" cy="240" r="1.5"/><circle cx="300" cy="240" r="1.5"/><circle cx="360" cy="240" r="1.5"/><circle cx="420" cy="240" r="1.5"/><circle cx="480" cy="240" r="1.5"/><circle cx="540" cy="240" r="1.5"/><circle cx="600" cy="240" r="1.5"/><circle cx="660" cy="240" r="1.5"/><circle cx="720" cy="240" r="1.5"/><circle cx="780" cy="240" r="1.5"/><circle cx="840" cy="240" r="1.5"/>
    <circle cx="60" cy="300" r="1.5"/><circle cx="120" cy="300" r="1.5"/><circle cx="180" cy="300" r="1.5"/><circle cx="240" cy="300" r="1.5"/><circle cx="300" cy="300" r="1.5"/><circle cx="360" cy="300" r="1.5"/><circle cx="420" cy="300" r="1.5"/><circle cx="480" cy="300" r="1.5"/><circle cx="540" cy="300" r="1.5"/><circle cx="600" cy="300" r="1.5"/><circle cx="660" cy="300" r="1.5"/><circle cx="720" cy="300" r="1.5"/><circle cx="780" cy="300" r="1.5"/><circle cx="840" cy="300" r="1.5"/>
    <circle cx="60" cy="360" r="1.5"/><circle cx="120" cy="360" r="1.5"/><circle cx="180" cy="360" r="1.5"/><circle cx="240" cy="360" r="1.5"/><circle cx="300" cy="360" r="1.5"/><circle cx="360" cy="360" r="1.5"/><circle cx="420" cy="360" r="1.5"/><circle cx="480" cy="360" r="1.5"/><circle cx="540" cy="360" r="1.5"/><circle cx="600" cy="360" r="1.5"/><circle cx="660" cy="360" r="1.5"/><circle cx="720" cy="360" r="1.5"/><circle cx="780" cy="360" r="1.5"/><circle cx="840" cy="360" r="1.5"/>
  </g>

  <!-- ===== LEFT PHONE (iOS style) ===== -->
  <g filter="url(#softShadow)">
    <!-- Phone body -->
    <rect x="136" y="68" width="128" height="244" rx="22" fill="#1a1f35" stroke="rgba(108,99,255,0.5)" stroke-width="2"/>
    <!-- Notch -->
    <rect x="175" y="68" width="50" height="18" rx="9" fill="#0a0e1a"/>
    <!-- Screen area -->
    <rect x="146" y="94" width="108" height="192" rx="4" fill="url(#screenGrad)"/>
    <!-- Home indicator -->
    <rect x="176" y="300" width="48" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <!-- Side button -->
    <rect x="264" y="130" width="4" height="40" rx="2" fill="rgba(255,255,255,0.1)"/>
    <!-- Volume buttons -->
    <rect x="132" y="125" width="4" height="26" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="132" y="160" width="4" height="26" rx="2" fill="rgba(255,255,255,0.1)"/>
  </g>

  <!-- Screen content — iOS App UI -->
  <g clip-path="url(#phoneScreen1)">
    <!-- Status bar -->
    <rect x="146" y="94" width="108" height="18" fill="rgba(0,0,0,0.3)"/>
    <text x="152" y="106" font-size="7" fill="#c8d0e0" font-family="'Inter', sans-serif">9:41</text>
    <!-- App header -->
    <rect x="146" y="112" width="108" height="28" fill="rgba(108,99,255,0.2)"/>
    <text x="200" y="130" font-size="9" fill="#fff" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="bold">Dashboard</text>
    <!-- Stats row -->
    <rect x="152" y="146" width="44" height="34" rx="6" fill="rgba(0,212,255,0.12)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
    <text x="174" y="160" font-size="8" fill="#00d4ff" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="bold">98%</text>
    <text x="174" y="172" font-size="6" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif">Uptime</text>
    <rect x="202" y="146" width="44" height="34" rx="6" fill="rgba(108,99,255,0.12)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
    <text x="224" y="160" font-size="8" fill="#6c63ff" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="bold">1.2s</text>
    <text x="224" y="172" font-size="6" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif">Load</text>
