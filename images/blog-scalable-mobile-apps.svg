    <circle cx="450" cy="79" r="5" fill="#0a0e1a" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
    <!-- Screen area -->
    <rect x="396" y="94" width="108" height="192" rx="4" fill="url(#screenGrad)"/>
    <!-- Bottom nav bar area -->
    <rect x="386" y="290" width="128" height="22" rx="0" fill="rgba(0,0,0,0.25)"/>
    <!-- Navigation gesture bar -->
    <rect x="424" y="302" width="52" height="3" rx="2" fill="rgba(255,255,255,0.1)"/>
    <!-- Side buttons -->
    <rect x="514" y="130" width="4" height="50" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="382" y="145" width="4" height="30" rx="2" fill="rgba(255,255,255,0.1)"/>
  </g>

