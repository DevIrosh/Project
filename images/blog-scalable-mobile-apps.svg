    <text x="165" y="276" font-size="14" text-anchor="middle" fill="#6c63ff">⌂</text>
    <text x="200" y="275" font-size="11" text-anchor="middle" fill="#6b7a99">◎</text>
    <text x="235" y="275" font-size="11" text-anchor="middle" fill="#6b7a99">⊕</text>
  </g>

  <!-- ===== CENTRE — Flutter logo / architecture diagram ===== -->
  <!-- Architecture layers -->
  <g transform="translate(310, 100)">
    <!-- Layer stack -->
    <rect x="0" y="0" width="80" height="32" rx="6" fill="rgba(0,212,255,0.12)" stroke="rgba(0,212,255,0.35)" stroke-width="1.5"/>
    <text x="40" y="21" font-size="9.5" fill="#00d4ff" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600">UI Layer</text>

    <line x1="40" y1="32" x2="40" y2="56" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 3"/>

    <rect x="0" y="56" width="80" height="32" rx="6" fill="rgba(108,99,255,0.12)" stroke="rgba(108,99,255,0.35)" stroke-width="1.5"/>
    <text x="40" y="77" font-size="9.5" fill="#8b85ff" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600">ViewModel</text>

    <line x1="40" y1="88" x2="40" y2="112" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 3"/>

    <rect x="0" y="112" width="80" height="32" rx="6" fill="rgba(78,160,255,0.12)" stroke="rgba(78,160,255,0.35)" stroke-width="1.5"/>
    <text x="40" y="133" font-size="9.5" fill="#4ea0ff" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600">Repository</text>

    <line x1="40" y1="144" x2="40" y2="168" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 3"/>

    <rect x="0" y="168" width="80" height="32" rx="6" fill="rgba(255,215,128,0.08)" stroke="rgba(255,215,128,0.3)" stroke-width="1.5"/>
    <text x="40" y="189" font-size="9.5" fill="#ffd580" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600">Data Source</text>

    <!-- Clean Architecture label -->
    <text x="40" y="232" font-size="8" fill="#6b7a99" text-anchor="middle" font-family="'Inter', sans-serif" letter-spacing="1">CLEAN ARCH</text>
  </g>

  <!-- ===== RIGHT PHONE (Android style) ===== -->
  <g filter="url(#softShadow)">
    <rect x="386" y="68" width="128" height="244" rx="16" fill="#1a1f35" stroke="rgba(0,212,255,0.45)" stroke-width="2"/>
    <!-- Camera bar top -->
