    <text x="155" y="199" font-size="6" fill="#6b7a99" font-family="'Inter', sans-serif">Performance</text>
    <!-- bar chart -->
    <rect x="158" y="222" width="8" height="12" rx="1" fill="#6c63ff" opacity="0.7"/>
    <rect x="170" y="215" width="8" height="19" rx="1" fill="#6c63ff" opacity="0.8"/>
    <rect x="182" y="208" width="8" height="26" rx="1" fill="#6c63ff"/>
    <rect x="194" y="212" width="8" height="22" rx="1" fill="#6c63ff" opacity="0.9"/>
    <rect x="206" y="205" width="8" height="29" rx="1" fill="#00d4ff"/>
    <rect x="218" y="210" width="8" height="24" rx="1" fill="#6c63ff" opacity="0.85"/>
    <!-- Nav bar -->
