    <rect x="407" y="158" width="10" height="10" rx="2" fill="rgba(108,99,255,0.5)"/>
    <rect x="423" y="159" width="45" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="423" y="165" width="30" height="3" rx="1.5" fill="rgba(255,255,255,0.07)"/>
    <rect x="402" y="180" width="95" height="22" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="407" y="186" width="10" height="10" rx="2" fill="rgba(0,212,255,0.4)"/>
    <rect x="423" y="187" width="38" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="423" y="193" width="52" height="3" rx="1.5" fill="rgba(255,255,255,0.07)"/>
    <rect x="402" y="208" width="95" height="22" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="407" y="214" width="10" height="10" rx="2" fill="rgba(78,160,255,0.4)"/>
    <rect x="423" y="215" width="55" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="423" y="221" width="28" height="3" rx="1.5" fill="rgba(255,255,255,0.07)"/>
    <!-- Sync queued banner -->
    <rect x="396" y="236" width="108" height="20" fill="rgba(255,189,46,0.1)" stroke="rgba(255,189,46,0.25)" stroke-width="1"/>
    <text x="450" y="249" font-size="6.5" fill="#ffbd2e" text-anchor="middle" font-family="'Inter', sans-serif">⏳ 3 changes queued to sync</text>
    <!-- FAB -->
    <circle cx="481" cy="272" r="14" fill="url(#flutterGrad)" filter="url(#glow)"/>
    <text x="481" y="277" font-size="14" fill="#fff" text-anchor="middle">+</text>
  </g>

  <!-- ===== RIGHT SIDE — Principles badges ===== -->
  <g font-family="'Inter', sans-serif">
    <!-- Badge 1 -->
    <rect x="560" y="80" width="300" height="46" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(108,99,255,0.2)" stroke-width="1"/>
    <rect x="570" y="94" width="24" height="18" rx="4" fill="rgba(108,99,255,0.2)"/>
    <text x="582" y="107" font-size="9" fill="#6c63ff" text-anchor="middle" font-weight="bold">01</text>
    <text x="604" y="101" font-size="9.5" fill="#c8d0e0" font-weight="600">Decouple UI from Business Logic</text>
    <text x="604" y="116" font-size="8" fill="#6b7a99">MVVM · Clean Architecture · BLoC</text>

    <!-- Badge 2 -->
    <rect x="560" y="138" width="300" height="46" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <rect x="570" y="152" width="24" height="18" rx="4" fill="rgba(0,212,255,0.15)"/>
    <text x="582" y="165" font-size="9" fill="#00d4ff" text-anchor="middle" font-weight="bold">02</text>
    <text x="604" y="159" font-size="9.5" fill="#c8d0e0" font-weight="600">Version Your API from Day One</text>
    <text x="604" y="174" font-size="8" fill="#6b7a99">/v1/ prefix · avoid breaking changes</text>

    <!-- Badge 3 -->
    <rect x="560" y="196" width="300" height="46" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(78,160,255,0.2)" stroke-width="1"/>
    <rect x="570" y="210" width="24" height="18" rx="4" fill="rgba(78,160,255,0.15)"/>
    <text x="582" y="223" font-size="9" fill="#4ea0ff" text-anchor="middle" font-weight="bold">03</text>
    <text x="604" y="217" font-size="9.5" fill="#c8d0e0" font-weight="600">Profile Early — Real Device Hardware</text>
    <text x="604" y="232" font-size="8" fill="#6b7a99">Flutter DevTools · Android Profiler</text>

    <!-- Badge 4 -->
    <rect x="560" y="254" width="300" height="46" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,215,128,0.2)" stroke-width="1"/>
    <rect x="570" y="268" width="24" height="18" rx="4" fill="rgba(255,215,128,0.1)"/>
    <text x="582" y="281" font-size="9" fill="#ffd580" text-anchor="middle" font-weight="bold">04</text>
    <text x="604" y="275" font-size="9.5" fill="#c8d0e0" font-weight="600">Design for Offline — Not Optional</text>
    <text x="604" y="290" font-size="8" fill="#6b7a99">Queue writes · optimistic UI updates</text>

    <!-- Badge 5 -->
    <rect x="560" y="312" width="300" height="46" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(40,200,64,0.2)" stroke-width="1"/>
    <rect x="570" y="326" width="24" height="18" rx="4" fill="rgba(40,200,64,0.1)"/>
    <text x="582" y="339" font-size="9" fill="#28c840" text-anchor="middle" font-weight="bold">05</text>
    <text x="604" y="333" font-size="9.5" fill="#c8d0e0" font-weight="600">Instrument Before Launch</text>
    <text x="604" y="348" font-size="8" fill="#6b7a99">Crashlytics · Sentry · analytics</text>
  </g>

  <!-- Flutter wordmark top right -->
  <rect x="660" y="15" width="210" height="34" rx="17" fill="rgba(0,212,255,0.12)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="677" y="37" font-size="12" fill="#00d4ff" font-weight="bold" font-family="'Inter', sans-serif">✦ Scalable Mobile Apps</text>

  <!-- Bottom fade -->
  <rect x="0" y="385" width="900" height="35" fill="url(#bgGrad)" opacity="0.9"/>
  <!-- Watermark -->
  <text x="888" y="413" font-family="sans-serif" font-size="11" fill="#ffffff" opacity="0.18" text-anchor="end">© ZyoraTech</text>
</svg>
