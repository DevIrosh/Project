    <text x="402" y="105" font-size="7" fill="#c8d0e0" font-family="'Inter', sans-serif">9:41</text>
    <!-- App bar material -->
    <rect x="396" y="110" width="108" height="36" fill="rgba(0,212,255,0.15)"/>
    <text x="450" y="133" font-size="9" fill="#fff" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="bold">ZyoraTech</text>
    <!-- Offline badge -->
    <rect x="464" y="116" width="34" height="14" rx="7" fill="rgba(255,95,87,0.2)" stroke="rgba(255,95,87,0.4)" stroke-width="1"/>
    <text x="481" y="126" font-size="6.5" fill="#ff5f57" text-anchor="middle" font-family="'Inter', sans-serif">offline</text>
    <!-- List items -->
