<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030d09"/>
      <stop offset="60%" style="stop-color:#061a0f"/>
      <stop offset="100%" style="stop-color:#0d3520"/>
    </linearGradient>
    <linearGradient id="heroPath" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c853;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#00d4af;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0.6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="340" fill="url(#heroBg)"/>
  <!-- grid dots -->
  <g opacity="0.06" fill="#00e5ff">
    <circle cx="80" cy="60" r="2"/><circle cx="200" cy="60" r="2"/><circle cx="320" cy="60" r="2"/><circle cx="440" cy="60" r="2"/><circle cx="560" cy="60" r="2"/><circle cx="680" cy="60" r="2"/>
    <circle cx="80" cy="140" r="2"/><circle cx="200" cy="140" r="2"/><circle cx="320" cy="140" r="2"/><circle cx="440" cy="140" r="2"/><circle cx="560" cy="140" r="2"/><circle cx="680" cy="140" r="2"/>
    <circle cx="80" cy="220" r="2"/><circle cx="200" cy="220" r="2"/><circle cx="320" cy="220" r="2"/><circle cx="440" cy="220" r="2"/><circle cx="560" cy="220" r="2"/><circle cx="680" cy="220" r="2"/>
    <circle cx="80" cy="300" r="2"/><circle cx="200" cy="300" r="2"/><circle cx="320" cy="300" r="2"/><circle cx="440" cy="300" r="2"/><circle cx="560" cy="300" r="2"/><circle cx="680" cy="300" r="2"/>
  </g>
  <!-- glow blobs -->
  <ellipse cx="600" cy="120" rx="160" ry="100" fill="url(#glow1)"/>
  <ellipse cx="200" cy="260" rx="120" ry="80" fill="url(#glow1)" opacity="0.5"/>
  <!-- main roadmap path -->
  <polyline points="80,280 200,210 330,225 460,140 590,160 720,80" stroke="url(#heroPath)" stroke-width="3" fill="none" stroke-dasharray="10,6"/>
  <!-- phase lane backgrounds -->
  <rect x="60" y="80" width="110" height="260" rx="6" fill="#00c853" opacity="0.04"/>
  <rect x="190" y="80" width="110" height="260" rx="6" fill="#00c853" opacity="0.04"/>
  <rect x="320" y="80" width="110" height="260" rx="6" fill="#00d4af" opacity="0.04"/>
  <rect x="450" y="80" width="110" height="260" rx="6" fill="#00e5ff" opacity="0.04"/>
  <rect x="580" y="80" width="110" height="260" rx="6" fill="#00e5ff" opacity="0.04"/>
  <rect x="700" y="80" width="60" height="260" rx="6" fill="#00e5ff" opacity="0.05"/>
  <!-- milestone nodes -->
  <circle cx="80" cy="280" r="9" fill="#00c853" opacity="0.8"/>
  <circle cx="200" cy="210" r="9" fill="#00c853" opacity="0.8"/>
  <circle cx="330" cy="225" r="9" fill="#00d4af" opacity="0.8"/>
  <circle cx="460" cy="140" r="12" fill="#00e5ff" opacity="0.85"/>
  <circle cx="590" cy="160" r="9" fill="#00e5ff" opacity="0.8"/>
  <circle cx="720" cy="80" r="12" fill="#00e5ff" opacity="0.9"/>
  <!-- glow rings -->
  <circle cx="460" cy="140" r="26" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.2"/>
  <circle cx="720" cy="80" r="26" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.25"/>
  <circle cx="460" cy="140" r="40" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.08"/>
  <!-- phase labels -->
  <text x="80" y="310" font-family="sans-serif" font-size="11" font-weight="600" fill="#00c853" opacity="0.7" text-anchor="middle">Audit</text>
  <text x="200" y="240" font-family="sans-serif" font-size="11" font-weight="600" fill="#00c853" opacity="0.7" text-anchor="middle">Align</text>
  <text x="330" y="255" font-family="sans-serif" font-size="11" font-weight="600" fill="#00d4af" opacity="0.7" text-anchor="middle">Design</text>
  <text x="460" y="124" font-family="sans-serif" font-size="11" font-weight="600" fill="#00e5ff" opacity="0.8" text-anchor="middle">Build</text>
  <text x="590" y="190" font-family="sans-serif" font-size="11" font-weight="600" fill="#00e5ff" opacity="0.7" text-anchor="middle">Deploy</text>
  <text x="720" y="62" font-family="sans-serif" font-size="11" font-weight="600" fill="#00e5ff" opacity="0.9" text-anchor="middle">Scale</text>
  <!-- decorative horizontal phase lines -->
  <line x1="60" y1="82" x2="760" y2="82" stroke="#00e5ff" stroke-width="0.5" opacity="0.08"/>
</svg>
