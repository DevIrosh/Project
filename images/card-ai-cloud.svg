<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="50%" style="stop-color:#0a1f3d"/>
      <stop offset="100%" style="stop-color:#0d3a6e"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#4ea0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="200" fill="url(#bg)"/>

  <!-- Grid lines subtle -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="50" x2="600" y2="50"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
  </g>

  <!-- Neural net connections -->
  <g stroke="rgba(108,99,255,0.3)" stroke-width="1.5" fill="none">
    <line x1="60" y1="60" x2="160" y2="40"/>
    <line x1="60" y1="60" x2="160" y2="100"/>
    <line x1="60" y1="140" x2="160" y2="100"/>
    <line x1="60" y1="140" x2="160" y2="160"/>
    <line x1="160" y1="40" x2="260" y2="60"/>
    <line x1="160" y1="100" x2="260" y2="60"/>
    <line x1="160" y1="100" x2="260" y2="140"/>
    <line x1="160" y1="160" x2="260" y2="140"/>
    <line x1="260" y1="60" x2="340" y2="100"/>
    <line x1="260" y1="140" x2="340" y2="100"/>
  </g>
  <g stroke="rgba(0,212,255,0.2)" stroke-width="1" fill="none">
    <line x1="340" y1="100" x2="420" y2="70"/>
    <line x1="340" y1="100" x2="420" y2="130"/>
  </g>

  <!-- Input nodes -->
  <circle cx="60" cy="60" r="9" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="60" cy="140" r="9" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <!-- Hidden nodes -->
  <circle cx="160" cy="40" r="7" fill="#6c63ff" opacity="0.85"/>
  <circle cx="160" cy="100" r="10" fill="#6c63ff" filter="url(#glow)"/>
  <circle cx="160" cy="160" r="7" fill="#6c63ff" opacity="0.85"/>
  <!-- Hidden layer 2 -->
  <circle cx="260" cy="60" r="8" fill="#4ea0ff" opacity="0.9"/>
  <circle cx="260" cy="140" r="8" fill="#4ea0ff" opacity="0.9"/>
  <!-- Output -->
  <circle cx="340" cy="100" r="13" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="340" cy="100" r="22" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <!-- Final outputs -->
  <circle cx="420" cy="70" r="7" fill="#00d4ff" opacity="0.7"/>
  <circle cx="420" cy="130" r="7" fill="#00d4ff" opacity="0.7"/>

  <!-- Code snippet right side -->
  <rect x="460" y="28" width="120" height="144" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- editor dots -->
  <circle cx="474" cy="42" r="3.5" fill="#ff5f57" opacity="0.7"/>
  <circle cx="486" cy="42" r="3.5" fill="#ffbd2e" opacity="0.7"/>
  <circle cx="498" cy="42" r="3.5" fill="#28c840" opacity="0.7"/>
  <!-- code lines -->
  <rect x="471" y="58" width="38" height="5" rx="2.5" fill="#6c63ff" opacity="0.7"/>
  <rect x="471" y="70" width="55" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
  <rect x="478" y="82" width="42" height="5" rx="2.5" fill="#00d4ff" opacity="0.6"/>
  <rect x="478" y="94" width="60" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
  <rect x="478" y="106" width="48" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
  <rect x="471" y="118" width="32" height="5" rx="2.5" fill="#6c63ff" opacity="0.6"/>
  <rect x="478" y="130" width="55" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
  <!-- AI suggestion bar -->
  <rect x="466" y="148" width="108" height="16" rx="4" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.25)" stroke-width="1"/>
  <rect x="471" y="153" width="24" height="5" rx="2.5" fill="#00d4ff" opacity="0.8"/>
  <rect x="500" y="153" width="66" height="5" rx="2.5" fill="rgba(255,255,255,0.1)"/>

  <!-- Glow orb centre-left -->
  <circle cx="340" cy="100" r="50" fill="rgba(0,212,255,0.04)"/>
  <circle cx="160" cy="100" r="40" fill="rgba(108,99,255,0.05)"/>
</svg>
