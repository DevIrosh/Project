<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0520"/>
      <stop offset="50%" style="stop-color:#1a0a3d"/>
      <stop offset="100%" style="stop-color:#2d1070"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35"/>
      <stop offset="100%" style="stop-color:#0d1125"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#4ea0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="s1"><rect x="64" y="32" width="86" height="136" rx="3"/></clipPath>
    <clipPath id="s2"><rect x="198" y="32" width="86" height="136" rx="3"/></clipPath>
  </defs>

  <rect width="600" height="200" fill="url(#bg)"/>

  <!-- Subtle dots -->
  <g fill="rgba(255,255,255,0.05)">
    <circle cx="50" cy="50" r="1.5"/><circle cx="100" cy="50" r="1.5"/><circle cx="150" cy="50" r="1.5"/>
    <circle cx="50" cy="100" r="1.5"/><circle cx="100" cy="100" r="1.5"/><circle cx="150" cy="100" r="1.5"/>
    <circle cx="50" cy="150" r="1.5"/><circle cx="100" cy="150" r="1.5"/><circle cx="150" cy="150" r="1.5"/>
  </g>

  <!-- ===== Left phone (iOS) ===== -->
  <g filter="url(#shadow)">
    <rect x="58" y="18" width="98" height="164" rx="16" fill="#1c2240" stroke="rgba(108,99,255,0.5)" stroke-width="1.5"/>
    <rect x="87" y="18" width="40" height="12" rx="6" fill="#0a0e1a"/>
    <rect x="64" y="32" width="86" height="136" rx="3" fill="url(#screenBg)"/>
    <rect x="84" y="158" width="36" height="3" rx="1.5" fill="rgba(255,255,255,0.12)"/>
  </g>
  <g clip-path="url(#s1)">
    <!-- Status bar -->
    <rect x="64" y="32" width="86" height="12" fill="rgba(0,0,0,0.3)"/>
    <!-- App header -->
    <rect x="64" y="44" width="86" height="22" fill="rgba(108,99,255,0.2)"/>
    <rect x="68" y="50" width="40" height="5" rx="2.5" fill="rgba(255,255,255,0.5)"/>
    <!-- Stats cards -->
    <rect x="68" y="72" width="36" height="26" rx="5" fill="rgba(0,212,255,0.12)" stroke="rgba(0,212,255,0.3)" stroke-width="0.8"/>
    <rect x="71" y="78" width="20" height="5" rx="2.5" fill="#00d4ff" opacity="0.8"/>
    <rect x="71" y="86" width="28" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="108" y="72" width="36" height="26" rx="5" fill="rgba(108,99,255,0.12)" stroke="rgba(108,99,255,0.3)" stroke-width="0.8"/>
    <rect x="111" y="78" width="14" height="5" rx="2.5" fill="#8b85ff" opacity="0.8"/>
    <rect x="111" y="86" width="26" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <!-- Bar chart -->
    <rect x="68" y="105" width="76" height="36" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
    <rect x="73" y="128" width="6" height="10" rx="1" fill="#6c63ff" opacity="0.6"/>
    <rect x="82" y="122" width="6" height="16" rx="1" fill="#6c63ff" opacity="0.75"/>
    <rect x="91" y="117" width="6" height="21" rx="1" fill="#6c63ff"/>
    <rect x="100" y="120" width="6" height="18" rx="1" fill="#00d4ff"/>
    <rect x="109" y="114" width="6" height="24" rx="1" fill="#00d4ff" opacity="0.9"/>
    <rect x="118" y="118" width="6" height="20" rx="1" fill="#6c63ff" opacity="0.8"/>
    <!-- Nav bar -->
    <rect x="64" y="148" width="86" height="20" fill="rgba(0,0,0,0.35)"/>
    <rect x="81" y="153" width="10" height="10" rx="5" fill="rgba(108,99,255,0.6)"/>
    <rect x="101" y="155" width="10" height="6" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="121" y="155" width="10" height="6" rx="2" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Connection arrow -->
  <g fill="rgba(108,99,255,0.5)">
    <line x1="163" y1="100" x2="192" y2="100" stroke="rgba(108,99,255,0.4)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polygon points="190,95 198,100 190,105" fill="rgba(108,99,255,0.5)"/>
  </g>

  <!-- ===== Right phone (Android) ===== -->
  <g filter="url(#shadow)">
    <rect x="192" y="18" width="98" height="164" rx="12" fill="#1c2240" stroke="rgba(0,212,255,0.45)" stroke-width="1.5"/>
    <rect x="192" y="18" width="98" height="16" rx="12" fill="rgba(0,0,0,0.2)"/>
    <circle cx="241" cy="26" r="4" fill="#0a0e1a" stroke="rgba(0,212,255,0.3)" stroke-width="0.8"/>
    <rect x="198" y="32" width="86" height="136" rx="3" fill="url(#screenBg)"/>
    <rect x="218" y="156" width="40" height="3" rx="1.5" fill="rgba(255,255,255,0.1)"/>
  </g>
  <g clip-path="url(#s2)">
    <rect x="198" y="32" width="86" height="12" fill="rgba(0,0,0,0.25)"/>
    <rect x="198" y="44" width="86" height="22" fill="rgba(0,212,255,0.12)"/>
    <rect x="202" y="50" width="36" height="5" rx="2.5" fill="rgba(255,255,255,0.4)"/>
    <!-- List items -->
    <rect x="202" y="72" width="78" height="16" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
    <rect x="206" y="76" width="8" height="8" rx="2" fill="rgba(108,99,255,0.5)"/>
    <rect x="219" y="77" width="36" height="4" rx="2" fill="rgba(255,255,255,0.18)"/>
    <rect x="202" y="93" width="78" height="16" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
    <rect x="206" y="97" width="8" height="8" rx="2" fill="rgba(0,212,255,0.4)"/>
    <rect x="219" y="98" width="42" height="4" rx="2" fill="rgba(255,255,255,0.18)"/>
    <rect x="202" y="114" width="78" height="16" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
    <rect x="206" y="118" width="8" height="8" rx="2" fill="rgba(78,160,255,0.4)"/>
    <rect x="219" y="119" width="30" height="4" rx="2" fill="rgba(255,255,255,0.18)"/>
    <!-- Offline banner -->
    <rect x="198" y="134" width="86" height="14" fill="rgba(255,189,46,0.1)" stroke="rgba(255,189,46,0.3)" stroke-width="0.8"/>
    <rect x="203" y="138" width="50" height="4" rx="2" fill="rgba(255,189,46,0.4)"/>
    <!-- FAB -->
    <circle cx="262" cy="151" r="10" fill="url(#btnGrad)" filter="url(#glow)"/>
    <rect x="258" y="148" width="8" height="2" rx="1" fill="#fff"/>
    <rect x="261" y="145" width="2" height="8" rx="1" fill="#fff"/>
  </g>

  <!-- ===== Right: Architecture pills & Flutter label ===== -->
  <g font-family="'Inter', sans-serif" font-size="10">
    <rect x="318" y="28" width="110" height="22" rx="11" fill="rgba(108,99,255,0.12)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
    <text x="373" y="43" fill="#8b85ff" text-anchor="middle" font-weight="600">Clean Architecture</text>

    <rect x="450" y="28" width="110" height="22" rx="11" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.28)" stroke-width="1"/>
    <text x="505" y="43" fill="#00d4ff" text-anchor="middle" font-weight="600">Flutter / Dart</text>

    <rect x="318" y="60" width="110" height="22" rx="11" fill="rgba(78,160,255,0.1)" stroke="rgba(78,160,255,0.28)" stroke-width="1"/>
    <text x="373" y="75" fill="#4ea0ff" text-anchor="middle" font-weight="600">MVVM · BLoC</text>

    <rect x="450" y="60" width="110" height="22" rx="11" fill="rgba(40,200,64,0.08)" stroke="rgba(40,200,64,0.2)" stroke-width="1"/>
    <text x="505" y="75" fill="#28c840" text-anchor="middle" font-weight="600">iOS &amp; Android</text>

    <rect x="318" y="92" width="110" height="22" rx="11" fill="rgba(255,215,128,0.08)" stroke="rgba(255,215,128,0.25)" stroke-width="1"/>
    <text x="373" y="107" fill="#ffd580" text-anchor="middle" font-weight="600">API Versioning</text>

    <rect x="450" y="92" width="110" height="22" rx="11" fill="rgba(108,99,255,0.1)" stroke="rgba(108,99,255,0.25)" stroke-width="1"/>
    <text x="505" y="107" fill="#8b85ff" text-anchor="middle" font-weight="600">Crashlytics</text>

    <rect x="318" y="124" width="110" height="22" rx="11" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <text x="373" y="139" fill="#00d4ff" text-anchor="middle" font-weight="600">Offline-First</text>

    <rect x="450" y="124" width="110" height="22" rx="11" fill="rgba(255,95,87,0.08)" stroke="rgba(255,95,87,0.2)" stroke-width="1"/>
    <text x="505" y="139" fill="#ff5f57" text-anchor="middle" font-weight="600">Performance</text>

    <!-- Performance bars visual -->
    <rect x="330" y="158" width="244" height="28" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <rect x="338" y="165" width="28" height="14" rx="2" fill="#6c63ff" opacity="0.6"/>
    <rect x="370" y="165" width="38" height="14" rx="2" fill="#6c63ff" opacity="0.75"/>
    <rect x="412" y="165" width="50" height="14" rx="2" fill="#00d4ff"/>
    <rect x="466" y="165" width="42" height="14" rx="2" fill="#00d4ff" opacity="0.8"/>
    <rect x="512" y="165" width="54" height="14" rx="2" fill="#6c63ff" filter="url(#glow)"/>

    <text x="338" y="163" font-size="7" fill="#6b7a99">App Performance Scaling</text>
  </g>
  <!-- Watermark -->
  <text x="590" y="194" font-family="sans-serif" font-size="8" fill="#ffffff" opacity="0.18" text-anchor="end">© ZyoraTech</text>
</svg>
