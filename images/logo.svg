<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2fff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7b2fff;stop-opacity:0.15" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="160" height="160" rx="32" fill="url(#grad2)" />
  <rect width="160" height="160" rx="32" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.5"/>

  <!-- Z letter mark – bold tech style -->
  <!-- Top horizontal bar -->
  <rect x="36" y="36" width="88" height="16" rx="8" fill="url(#grad1)" />
  <!-- Diagonal slash -->
  <polygon points="100,52 60,92 88,92 48,108 52.5,108 96,56 96,52" fill="none" />
  <line x1="100" y1="52" x2="40" y2="108" stroke="url(#grad1)" stroke-width="15" stroke-linecap="round"/>
  <!-- Bottom horizontal bar -->
  <rect x="36" y="108" width="88" height="16" rx="8" fill="url(#grad1)" />

  <!-- Glowing dot accent top-right -->
  <circle cx="130" cy="30" r="8" fill="#00d4ff" opacity="0.8"/>
  <circle cx="130" cy="30" r="12" fill="#00d4ff" opacity="0.15"/>
</svg>
