<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="60%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>

    <!-- Brand cyan→purple gradient (used for logo, heading, accents) -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>

    <!-- Logo box fill (very subtle) -->
    <linearGradient id="logoBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7b2fff" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Logo box border -->
    <linearGradient id="logoBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7b2fff" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Heading gradient text -->
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#9b6fff"/>
    </linearGradient>

    <!-- Bottom accent line -->
    <linearGradient id="bottomLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#7b2fff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow radials -->
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b2fff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#7b2fff" stop-opacity="0"/>
    </radialGradient>

    <!-- Logo Z mark gradient — diagonal, matches original logo exactly -->
    <linearGradient id="logoZGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>

    <!-- Node soft glow filter -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Atmospheric glow orbs -->
  <ellipse cx="1000" cy="160" rx="320" ry="230" fill="url(#cyanGlow)"/>
  <ellipse cx="180"  cy="520" rx="260" ry="190" fill="url(#purpleGlow)"/>
  <ellipse cx="620"  cy="330" rx="220" ry="170" fill="url(#purpleGlow)" opacity="0.4"/>

  <!-- Grid dot texture -->
  <g fill="rgba(255,255,255,0.04)">
    <circle cx="60"   cy="63"  r="1.8"/><circle cx="160"  cy="63"  r="1.8"/><circle cx="260"  cy="63"  r="1.8"/>
    <circle cx="360"  cy="63"  r="1.8"/><circle cx="460"  cy="63"  r="1.8"/><circle cx="560"  cy="63"  r="1.8"/>
    <circle cx="660"  cy="63"  r="1.8"/><circle cx="760"  cy="63"  r="1.8"/><circle cx="860"  cy="63"  r="1.8"/>
    <circle cx="960"  cy="63"  r="1.8"/><circle cx="1060" cy="63"  r="1.8"/><circle cx="1160" cy="63"  r="1.8"/>

    <circle cx="60"   cy="163" r="1.8"/><circle cx="160"  cy="163" r="1.8"/><circle cx="260"  cy="163" r="1.8"/>
    <circle cx="360"  cy="163" r="1.8"/><circle cx="460"  cy="163" r="1.8"/><circle cx="560"  cy="163" r="1.8"/>
    <circle cx="660"  cy="163" r="1.8"/><circle cx="760"  cy="163" r="1.8"/><circle cx="860"  cy="163" r="1.8"/>
    <circle cx="960"  cy="163" r="1.8"/><circle cx="1060" cy="163" r="1.8"/><circle cx="1160" cy="163" r="1.8"/>

    <circle cx="60"   cy="263" r="1.8"/><circle cx="160"  cy="263" r="1.8"/><circle cx="260"  cy="263" r="1.8"/>
    <circle cx="360"  cy="263" r="1.8"/><circle cx="460"  cy="263" r="1.8"/><circle cx="560"  cy="263" r="1.8"/>
    <circle cx="660"  cy="263" r="1.8"/><circle cx="760"  cy="263" r="1.8"/><circle cx="860"  cy="263" r="1.8"/>
    <circle cx="960"  cy="263" r="1.8"/><circle cx="1060" cy="263" r="1.8"/><circle cx="1160" cy="263" r="1.8"/>

    <circle cx="60"   cy="363" r="1.8"/><circle cx="160"  cy="363" r="1.8"/><circle cx="260"  cy="363" r="1.8"/>
    <circle cx="360"  cy="363" r="1.8"/><circle cx="460"  cy="363" r="1.8"/><circle cx="560"  cy="363" r="1.8"/>
    <circle cx="660"  cy="363" r="1.8"/><circle cx="760"  cy="363" r="1.8"/><circle cx="860"  cy="363" r="1.8"/>
    <circle cx="960"  cy="363" r="1.8"/><circle cx="1060" cy="363" r="1.8"/><circle cx="1160" cy="363" r="1.8"/>

    <circle cx="60"   cy="463" r="1.8"/><circle cx="160"  cy="463" r="1.8"/><circle cx="260"  cy="463" r="1.8"/>
    <circle cx="360"  cy="463" r="1.8"/><circle cx="460"  cy="463" r="1.8"/><circle cx="560"  cy="463" r="1.8"/>
    <circle cx="660"  cy="463" r="1.8"/><circle cx="760"  cy="463" r="1.8"/><circle cx="860"  cy="463" r="1.8"/>
    <circle cx="960"  cy="463" r="1.8"/><circle cx="1060" cy="463" r="1.8"/><circle cx="1160" cy="463" r="1.8"/>

    <circle cx="60"   cy="563" r="1.8"/><circle cx="160"  cy="563" r="1.8"/><circle cx="260"  cy="563" r="1.8"/>
    <circle cx="360"  cy="563" r="1.8"/><circle cx="460"  cy="563" r="1.8"/><circle cx="560"  cy="563" r="1.8"/>
    <circle cx="660"  cy="563" r="1.8"/><circle cx="760"  cy="563" r="1.8"/><circle cx="860"  cy="563" r="1.8"/>
    <circle cx="960"  cy="563" r="1.8"/><circle cx="1060" cy="563" r="1.8"/><circle cx="1160" cy="563" r="1.8"/>
  </g>

  <!-- ── ACTUAL COMPANY LOGO (PNG embedded — exact brand asset from brand/ folder) ── -->
  <image href="../brand/Company%20Logo-4K%20.png"
         x="52" y="42" width="106" height="113"/>

  <!-- Company name beside logo -->
  <text x="174" y="97"
        font-family="'Space Grotesk', 'Inter', Arial, sans-serif"
        font-size="33" font-weight="700"
        fill="white" letter-spacing="-0.5">ZyoraTech</text>
  <text x="175" y="124"
        font-family="'Inter', Arial, sans-serif"
        font-size="13.5" font-weight="400"
        fill="rgba(255,255,255,0.42)" letter-spacing="2.5">CUSTOM SOFTWARE SOLUTIONS</text>

  <!-- Horizontal rule under header -->
  <rect x="60" y="181" width="680" height="1" fill="rgba(255,255,255,0.07)"/>

  <!-- ── MAIN HEADLINE ── -->
  <text x="60" y="268"
        font-family="'Space Grotesk', 'Inter', Arial, sans-serif"
        font-size="66" font-weight="700"
        fill="white" letter-spacing="-1.5">Turning Ideas into</text>
  <text x="60" y="348"
        font-family="'Space Grotesk', 'Inter', Arial, sans-serif"
        font-size="66" font-weight="700"
        fill="url(#headGrad)" letter-spacing="-1.5">Powerful Software</text>

  <!-- ── SUBTITLE ── -->
  <text x="62" y="408"
        font-family="'Inter', Arial, sans-serif"
        font-size="21" font-weight="400"
        fill="rgba(255,255,255,0.72)">Custom Development · Mobile Apps · AI · Cloud Architecture</text>

  <!-- ── SERVICE TAGS ── -->
  <!-- Tag: Custom Dev -->
  <rect x="62" y="440" width="164" height="40" rx="20" fill="rgba(0,212,255,0.12)" stroke="rgba(0,212,255,0.45)" stroke-width="1.2"/>
  <text x="144" y="466"
        font-family="'Inter', Arial, sans-serif" font-size="15.5" font-weight="600"
        fill="#00d4ff" text-anchor="middle">Custom Dev</text>

  <!-- Tag: Mobile Apps -->
  <rect x="238" y="440" width="158" height="40" rx="20" fill="rgba(123,47,255,0.12)" stroke="rgba(155,111,255,0.45)" stroke-width="1.2"/>
  <text x="317" y="466"
        font-family="'Inter', Arial, sans-serif" font-size="15.5" font-weight="600"
        fill="#b090ff" text-anchor="middle">Mobile Apps</text>

  <!-- Tag: AI Integration -->
  <rect x="408" y="440" width="168" height="40" rx="20" fill="rgba(0,212,255,0.12)" stroke="rgba(0,212,255,0.45)" stroke-width="1.2"/>
  <text x="492" y="466"
        font-family="'Inter', Arial, sans-serif" font-size="15.5" font-weight="600"
        fill="#00d4ff" text-anchor="middle">AI Integration</text>

  <!-- Tag: Cloud Architecture -->
  <rect x="588" y="440" width="196" height="40" rx="20" fill="rgba(123,47,255,0.12)" stroke="rgba(155,111,255,0.45)" stroke-width="1.2"/>
  <text x="686" y="466"
        font-family="'Inter', Arial, sans-serif" font-size="15.5" font-weight="600"
        fill="#b090ff" text-anchor="middle">Cloud Architecture</text>

  <!-- ── BOTTOM BAR ── -->
  <rect x="0" y="578" width="1200" height="2" fill="url(#bottomLine)"/>

  <!-- URL bottom-left -->
  <text x="62" y="604"
        font-family="'Space Grotesk', 'Inter', Arial, sans-serif"
        font-size="18" font-weight="600"
        fill="rgba(0,212,255,0.85)">zyoratech.com</text>

  <!-- Tagline bottom-right -->
  <text x="1138" y="604"
        font-family="'Inter', Arial, sans-serif"
        font-size="15" font-weight="400"
        fill="rgba(255,255,255,0.45)" text-anchor="end">We build technology that drives your business forward</text>

  <!-- ── RIGHT SIDE — TECH NODE NETWORK ── -->

  <!-- Large faded Z watermark (right half background art) -->
  <g opacity="0.035" fill="white">
    <rect x="790" y="90"  width="350" height="58" rx="29"/>
    <rect x="790" y="480" width="350" height="58" rx="29"/>
  </g>
  <line x1="1130" y1="148" x2="800" y2="480" stroke="rgba(255,255,255,0.035)" stroke-width="58" stroke-linecap="round"/>

  <!-- Network node connections -->
  <g stroke="rgba(0,212,255,0.12)" stroke-width="1" fill="none">
    <line x1="860"  y1="185" x2="990"  y2="130"/>
    <line x1="990"  y1="130" x2="1100" y2="210"/>
    <line x1="860"  y1="185" x2="945"  y2="305"/>
    <line x1="1100" y1="210" x2="945"  y2="305"/>
    <line x1="1100" y1="210" x2="1125" y2="335"/>
    <line x1="945"  y1="305" x2="1050" y2="365"/>
    <line x1="1125" y1="335" x2="1050" y2="365"/>
    <line x1="945"  y1="305" x2="866"  y2="400"/>
    <line x1="860"  y1="185" x2="795"  y2="295"/>
    <line x1="795"  y1="295" x2="866"  y2="400"/>
    <line x1="1050" y1="365" x2="1065" y2="480"/>
    <line x1="866"  y1="400" x2="920"  y2="500"/>
    <line x1="1150" y1="460" x2="1065" y2="480"/>
    <line x1="1125" y1="335" x2="1150" y2="460"/>
    <line x1="795"  y1="295" x2="840"  y2="440"/>
  </g>

  <!-- Brighter top connections (cyan glow effect) -->
  <g stroke="rgba(0,212,255,0.28)" stroke-width="1.5" fill="none">
    <line x1="860"  y1="185" x2="990"  y2="130"/>
    <line x1="990"  y1="130" x2="1100" y2="210"/>
  </g>

  <!-- Network nodes -->
  <!-- Primary node - large -->
  <circle cx="860"  cy="185" r="8"  fill="#00d4ff" opacity="0.55" filter="url(#nodeGlow)"/>
  <circle cx="860"  cy="185" r="16" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.25"/>
  <circle cx="860"  cy="185" r="26" fill="none" stroke="#00d4ff" stroke-width="0.4" opacity="0.12"/>

  <!-- Secondary nodes -->
  <circle cx="990"  cy="130" r="6"  fill="#00d4ff" opacity="0.4"/>
  <circle cx="990"  cy="130" r="12" fill="none" stroke="#00d4ff" stroke-width="0.7" opacity="0.2"/>

  <circle cx="1100" cy="210" r="5.5" fill="#7b2fff" opacity="0.55" filter="url(#nodeGlow)"/>
  <circle cx="1100" cy="210" r="13" fill="none" stroke="#7b2fff" stroke-width="0.7" opacity="0.22"/>

  <circle cx="945"  cy="305" r="7"  fill="#7b2fff" opacity="0.45" filter="url(#nodeGlow)"/>
