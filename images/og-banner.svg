  <circle cx="1050" cy="365" r="5"  fill="#00d4ff" opacity="0.35"/>
  <circle cx="1125" cy="335" r="4.5" fill="#7b2fff" opacity="0.4"/>
  <circle cx="795"  cy="295" r="5"  fill="#7b2fff" opacity="0.3"/>
  <circle cx="866"  cy="400" r="6"  fill="#00d4ff" opacity="0.38"/>
  <circle cx="840"  cy="440" r="4"  fill="#7b2fff" opacity="0.25"/>
  <circle cx="1065" cy="480" r="5.5" fill="#00d4ff" opacity="0.3"/>
  <circle cx="920"  cy="500" r="4"  fill="#7b2fff" opacity="0.22"/>
  <circle cx="1150" cy="460" r="4.5" fill="#00d4ff" opacity="0.25"/>
</svg>
